services:
  db:
    image: timescale/timescaledb:2-pg16
    environment:
      POSTGRES_USER: cex_router
      POSTGRES_PASSWORD: cex_router
      POSTGRES_DB: cex_router
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cex_router -d cex_router"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: cmd/migrate/Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

  api:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        APP: api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://cex_router:cex_router@db:5432/cex_router?sslmode=disable
      LISTEN_ADDR: :8080
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  ingester:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        APP: ingester
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://cex_router:cex_router@db:5432/cex_router?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        APP: bot
    profiles:
      - bot
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://cex_router:cex_router@db:5432/cex_router?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
